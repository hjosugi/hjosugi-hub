name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: read

concurrency:
  group: link-check
  cancel-in-progress: true

jobs:
  lychee:
    name: Check exported site links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.x"
          elixir-version: "1.18.x"
      - name: Export site
        run: mix hub.export --out public
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,204,206,429
            --exclude-path public/radar-data
            "public/**/*.html"
          fail: true
